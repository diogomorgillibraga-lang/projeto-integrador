<style>
  /* ===== TODAS AS VARIÁVEIS E ESTILOS ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --ibv-red: #C0392B;
    --ibv-red-light: #E74C3C;
    --ibv-navy: #1A2744;
    --ibv-navy-dark: #0F1A2E;
  }
  
  [data-theme="dark"] {
    --bg-primary: #0D1421;
    --bg-secondary: #131D30;
    --bg-card: #1A2744;
    --text-primary: #F0F4FF;
    --text-secondary: #9AABC9;
    --text-muted: #607090;
    --border: rgba(144,168,220,0.12);
    --border-strong: rgba(144,168,220,0.25);
    --nav-bg: rgba(13,20,33,0.92);
    --input-bg: rgba(26,39,68,0.8);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
  }
  
  [data-theme="light"] {
    --bg-primary: #F5F7FC;
    --bg-secondary: #EEF1FA;
    --bg-card: #FFFFFF;
    --text-primary: #0F1A2E;
    --text-secondary: #3A4F72;
    --text-muted: #7A8FAB;
    --border: rgba(26,39,100,0.1);
    --border-strong: rgba(26,39,100,0.2);
    --nav-bg: rgba(245,247,252,0.95);
    --input-bg: rgba(238,241,250,0.9);
    --shadow: 0 8px 32px rgba(26,39,100,0.12);
    --shadow-card: 0 4px 24px rgba(26,39,100,0.08);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: background 0.3s, color 0.3s;
  }

  /* NAVBAR */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    height: 70px;
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; height: 70px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-primary); }
  .logo-icon {
    width: 50px; height: 40px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: #fff; border-radius: 6px; padding: 2px;
  }
  .logo-text strong { display: block; font-size: 15px; font-weight: 700; }
  .logo-text span { display: block; font-size: 11px; color: var(--text-secondary); }
  
  .nav-links { display: flex; align-items: center; gap: 0.25rem; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--text-secondary);
    font-size: 14px; font-weight: 500; padding: 0.5rem 0.9rem;
    border-radius: 8px; transition: color 0.2s, background 0.2s;
  }
  .nav-links a:hover { color: var(--text-primary); background: var(--border); }
  
  .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
  .theme-toggle {
    width: 44px; height: 24px; background: var(--border-strong);
    border-radius: 12px; border: none; cursor: pointer; position: relative;
  }
  .theme-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ibv-red); transition: transform 0.3s;
  }
  [data-theme="light"] .theme-toggle::after { transform: translateX(20px); }
  
  .btn-cta {
    background: var(--ibv-red); color: #fff;
    border: none; padding: 0.5rem 1.1rem;
    border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; text-decoration: none;
  }
  
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    background: none; border: none; cursor: pointer; padding: 4px;
  }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--text-primary); }

  /* CONTEÚDO */
  main { padding-top: 90px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 2rem; }

  /* BREADCRUMB */
  .breadcrumb {
    display: flex; gap: 0.5rem; margin-bottom: 2rem;
    font-size: 13px; color: var(--text-secondary);
  }
  .breadcrumb a { color: var(--ibv-red); text-decoration: none; }

  /* LAYOUT PRINCIPAL */
  .product-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 3rem;
  }

  /* GALERIA */
  .gallery-section { display: flex; flex-direction: column; gap: 1rem; }
  .main-image {
    width: 100%; aspect-ratio: 16/10;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .main-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  
  .thumbnail-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
  .thumbnail {
    aspect-ratio: 1; background: var(--bg-card); 
    border: 2px solid var(--border); border-radius: 8px;
    cursor: pointer; overflow: hidden;
    transition: border-color 0.2s;
  }
  .thumbnail:hover { border-color: var(--ibv-red); }
  .thumbnail.active { border-color: var(--ibv-red); }
  .thumbnail img { width: 100%; height: 100%; object-fit: cover; }

  /* INFORMAÇÕES */
  .product-info { display: flex; flex-direction: column; gap: 1.5rem; }
  .product-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
  .product-location { font-size: 15px; color: var(--text-secondary); margin-bottom: 0.5rem; }

  .price-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem;
  }
  .price-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
  .price-value { font-size: 32px; font-weight: 700; color: var(--ibv-red); margin: 0.5rem 0; }
  .price-info { font-size: 13px; color: var(--text-secondary); }

  .features-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem;
  }
  .features-title { font-size: 16px; font-weight: 700; margin-bottom: 1rem; }
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .feature-item { display: flex; align-items: center; gap: 0.5rem; font-size: 14px; color: var(--text-secondary); }
  .feature-icon { font-size: 20px; }

  .action-buttons { display: flex; flex-direction: column; gap: 0.75rem; }
  .btn-whatsapp {
    background: #25D366; color: #fff; border: none;
    padding: 1rem; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; text-decoration: none; text-align: center;
    transition: background 0.2s;
  }
  .btn-whatsapp:hover { background: #1ead4f; }
  .btn-favorite {
    background: var(--btn-secondary-bg); color: var(--text-primary);
    border: 1px solid var(--border-strong); padding: 1rem;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .btn-favorite:hover { background: var(--ibv-red); color: #fff; }

  /* DESCRIÇÃO */
  .description-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;
  }
  .description-title { font-size: 18px; font-weight: 700; margin-bottom: 1rem; }
  .description-text { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }

  /* SIMILARES */
  .similar-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem; margin-top: 1.5rem;
  }
  .similar-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    text-decoration: none; color: inherit; display: block;
    transition: transform 0.25s;
  }
  .similar-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-card); }
  .similar-image { width: 100%; aspect-ratio: 16/10; overflow: hidden; }
  .similar-image img { width: 100%; height: 100%; object-fit: cover; }
  .similar-body { padding: 1rem; }
  .similar-title { font-size: 14px; font-weight: 700; margin-bottom: 0.5rem; }
  .similar-price { font-size: 16px; font-weight: 700; color: var(--ibv-red); }

  /* LOADING */
  .loading-state { text-align: center; padding: 4rem; font-size: 18px; color: var(--text-secondary); }

  /* FOOTER */
  footer {
    background: var(--bg-secondary); padding: 2rem 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center; font-size: 13px; color: var(--text-muted);
  }
  footer a { color: var(--ibv-red); text-decoration: none; }

  /* MOBILE */
  .mobile-menu {
    display: none; position: fixed; top: 70px; left: 0; right: 0;
    background: var(--nav-bg); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem; z-index: 999; flex-direction: column; gap: 0.5rem;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { text-decoration: none; color: var(--text-secondary); font-size: 15px; padding: 0.65rem; border-radius: 8px; }

  @media (max-width: 768px) {
    .nav-links, .nav-actions .btn-cta { display: none; }
    .hamburger { display: flex; }
    .product-layout { grid-template-columns: 1fr; }
    .features-grid { grid-template-columns: 1fr; }
    .thumbnail-gallery { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 480px) {
    .product-title { font-size: 22px; }
    .price-value { font-size: 24px; }
    .thumbnail-gallery { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

  // ======================================================
  // 2. FUNÇÃO PRINCIPAL: CARREGAR IMÓVEL PELO ID
  // ======================================================
  function carregarImovel() {
    // Pega o ID da URL (ex: ?id=3)
    const params = new URLSearchParams(window.location.search);
    const idAtual = parseInt(params.get('id')) || 1;
    
    // Busca o imóvel no array
    const imovel = imoveis.find(i => i.id === idAtual);
    
    if (!imovel) {
      document.getElementById('loadingState').textContent = '❌ Imóvel não encontrado!';
      return;
    }

    // Esconde loading e mostra conteúdo
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageContent').style.display = 'block';

    // Preenche todos os campos
    document.title = `${imovel.titulo} - IBV Bela Vista`;
    document.getElementById('breadcrumbNome').textContent = imovel.titulo;
    
    // Imagem principal
    const mainImg = document.getElementById('mainImage');
    mainImg.src = imovel.imagemPrincipal;
    mainImg.alt = imovel.titulo;
    
    // Miniaturas
    const thumbContainer = document.getElementById('thumbnailGallery');
    thumbContainer.innerHTML = '';
    imovel.miniaturas.forEach((src, index) => {
      const div = document.createElement('div');
      div.className = 'thumbnail' + (index === 0 ? ' active' : '');
      div.onclick = () => {
        document.getElementById('mainImage').src = src;
        document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
        div.classList.add('active');
      };
      div.innerHTML = `<img src="${src}" alt="Foto ${index + 1}">`;
      thumbContainer.appendChild(div);
    });

    // Informações
    document.getElementById('imovelTitulo').textContent = imovel.titulo;
    document.getElementById('imovelLocalizacao').textContent = imovel.localizacao;
    document.getElementById('imovelPreco').textContent = imovel.preco;
    document.getElementById('imovelCondicao').textContent = imovel.condicao;
    document.getElementById('imovelDescricao').textContent = imovel.descricao;

    // Características
    const featGrid = document.getElementById('featuresGrid');
    featGrid.innerHTML = '';
    imovel.caracteristicas.forEach(f => {
      const div = document.createElement('div');
      div.className = 'feature-item';
      div.innerHTML = `<span class="feature-icon">${f.icone}</span><span>${f.texto}</span>`;
      featGrid.appendChild(div);
    });

    // WhatsApp
    const msg = encodeURIComponent(`Olá! Tenho interesse no imóvel: ${imovel.titulo}.`);
    document.getElementById('btnWhatsapp').href = `https://wa.me/5517997078440?text=${msg}`;

    // Imóveis similares (exclui o atual)
    const similares = imoveis
      .filter(i => i.id !== idAtual)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3);

    const simGrid = document.getElementById('similarGrid');
    simGrid.innerHTML = '';
    similares.forEach(s => {
      const a = document.createElement('a');
      a.href = `imovel-detalhes.html?id=${s.id}`;
      a.className = 'similar-card';
      a.innerHTML = `
        <div class="similar-image">
          <img src="${s.imagemPrincipal}" alt="${s.titulo}">
        </div>
        <div class="similar-body">
          <h3 class="similar-title">${s.titulo}</h3>
          <p class="similar-price">${s.preco}</p>
        </div>
      `;
      simGrid.appendChild(a);
    });
  }

  // ======================================================
  // 3. FUNÇÃO FAVORITAR (salva no localStorage)
  // ======================================================
  function toggleFavorite(btn) {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id')) || 1;
    
    let favs = JSON.parse(localStorage.getItem('favoritos') || '[]');
    const idx = favs.indexOf(id);
    
    if (idx === -1) {
      favs.push(id);
      btn.textContent = '❤️ Favoritado!';
      btn.style.background = '#C0392B';
      btn.style.color = '#fff';
    } else {
      favs.splice(idx, 1);
      btn.textContent = '❤️ Favoritar';
      btn.style.background = '';
      btn.style.color = '';
    }
    localStorage.setItem('favoritos', JSON.stringify(favs));
  }

  // ======================================================
  // 4. TEMA (CLARO/ESCURO)
  // ======================================================
  const html = document.documentElement;
  const temaSalvo = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', temaSalvo);

  document.getElementById('themeToggle').addEventListener('click', () => {
    const atual = html.getAttribute('data-theme');
    const novo = atual === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', novo);
    localStorage.setItem('theme', novo);
  });

  // ======================================================
  // 5. MENU MOBILE
  // ======================================================
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('open');
  });

  // ======================================================
  // 6. EXECUTA A CARGA QUANDO A PÁGINA CARREGAR
  // ======================================================
  window.onload = carregarImovel;
</script>
</body>
</html>
