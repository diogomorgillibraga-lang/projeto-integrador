<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Painel Administrativo - Imobiliária Bela Vista | Itajobi - SP">
  <meta name="keywords" content="admin, painel, imobiliária, Itajobi, imóveis">
  <title>Painel Admin - IBV Bela Vista | Itajobi - SP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ibv-red: #C0392B;
      --ibv-red-light: #E74C3C;
      --ibv-red-dark: #922B21;
      --ibv-navy: #1A2744;
      --ibv-navy-light: #243563;
      --ibv-navy-dark: #0F1A2E;
    }

    [data-theme="dark"] {
      --bg-primary: #0D1421;
      --bg-secondary: #131D30;
      --bg-card: #1A2744;
      --bg-card-hover: #1E2E50;
      --text-primary: #F0F4FF;
      --text-secondary: #9AABC9;
      --text-muted: #607090;
      --border: rgba(144, 168, 220, 0.12);
      --border-strong: rgba(144, 168, 220, 0.25);
      --nav-bg: rgba(13, 20, 33, 0.92);
      --input-bg: rgba(26, 39, 68, 0.8);
      --btn-secondary-bg: rgba(26, 39, 68, 0.6);
      --section-alt: #0F1A2E;
      --footer-bg: #080E1A;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    [data-theme="light"] {
      --bg-primary: #F5F7FC;
      --bg-secondary: #EEF1FA;
      --bg-card: #FFFFFF;
      --bg-card-hover: #F0F4FF;
      --text-primary: #0F1A2E;
      --text-secondary: #3A4F72;
      --text-muted: #7A8FAB;
      --border: rgba(26, 39, 100, 0.1);
      --border-strong: rgba(26, 39, 100, 0.2);
      --nav-bg: rgba(245, 247, 252, 0.95);
      --input-bg: rgba(238, 241, 250, 0.9);
      --btn-secondary-bg: rgba(255, 255, 255, 0.8);
      --section-alt: #EAEEF8;
      --footer-bg: #0F1A2E;
      --shadow: 0 8px 32px rgba(26, 39, 100, 0.12);
      --shadow-card: 0 4px 24px rgba(26, 39, 100, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* ── LAYOUT ── */
    .admin-wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 900;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
      text-decoration: none;
      color: var(--text-primary);
    }

    .sidebar-logo {
      width: 40px;
      height: 32px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2px;
    }

    .sidebar-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-nav {
      list-style: none;
    }

    .sidebar-nav li {
      margin-bottom: 0.5rem;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.75rem 1rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
      font-size: 14px;
      font-weight: 500;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: var(--bg-card);
      color: var(--ibv-red);
    }

    .sidebar-nav a.active {
      background: rgba(192, 57, 43, 0.15);
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      margin-left: 280px;
      background: var(--bg-primary);
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-card);
    }

    .topbar-left h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .theme-toggle {
      width: 44px;
      height: 24px;
      background: var(--border-strong);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
      padding: 0;
    }

    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--ibv-red);
      transition: transform 0.3s;
    }

    [data-theme="light"] .theme-toggle::after {
      transform: translateX(20px);
    }

    .logout-btn {
      background: var(--ibv-red);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: var(--ibv-red-light);
    }

    /* ── CONTENT AREA ── */
    .content {
      padding: 2rem;
    }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow-card);
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-change {
      font-size: 12px;
      color: #27AE60;
      margin-top: 0.5rem;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .section-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .section-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn-primary {
      background: var(--ibv-red);
      color: #fff;
      border: none;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--ibv-red-light);
    }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-strong);
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:hover {
      background: var(--bg-card-hover);
    }

    /* ── TABLE ── */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--section-alt);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 1rem;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-secondary);
    }

    tbody tr:hover {
      background: var(--bg-card-hover);
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-venda {
      background: rgba(192, 57, 43, 0.2);
      color: #E74C3C;
    }

    .badge-aluguel {
      background: rgba(26, 82, 118, 0.2);
      color: #5DADE2;
    }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-edit,
    .btn-delete,
    .btn-view {
      padding: 0.4rem 0.8rem;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-edit {
      background: rgba(26, 82, 118, 0.2);
      color: #5DADE2;
    }

    .btn-edit:hover {
      background: rgba(26, 82, 118, 0.3);
    }

    .btn-delete {
      background: rgba(192, 57, 43, 0.2);
      color: #E74C3C;
    }

    .btn-delete:hover {
      background: rgba(192, 57, 43, 0.3);
    }

    .btn-view {
      background: rgba(39, 174, 96, 0.2);
      color: #27AE60;
    }

    .btn-view:hover {
      background: rgba(39, 174, 96, 0.3);
    }

    /* ── MODAL ── */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-muted);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--ibv-red);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: flex-end;
    }

    .btn-save {
      background: var(--ibv-red);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover {
      background: var(--ibv-red-light);
    }

    .btn-cancel {
      background: var(--btn-secondary-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-strong);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: var(--bg-card-hover);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .sidebar {
        width: 240px;
      }

      .main-content {
        margin-left: 240px;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 1rem;
      }

      .main-content {
        margin-left: 0;
      }

      .sidebar-nav {
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
      }

      .sidebar-nav li {
        flex-shrink: 0;
      }

      .sidebar-nav a {
        padding: 0.5rem 0.75rem;
        font-size: 12px;
      }

      .content {
        padding: 1.5rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .topbar {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .topbar-right {
        width: 100%;
        justify-content: space-between;
      }

      table {
        font-size: 12px;
      }

      th,
      td {
        padding: 0.75rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="admin-wrapper">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a href="/Pagina_inicial" class="sidebar-header">
        <div class="sidebar-logo"><img src="logo.png" alt="IBV Logo"></div>
        <div class="sidebar-title">Bela Vista</div>
      </a>
      <nav class="sidebar-nav">
        <li><a href="#" class="active" onclick="showSection('imoveis')">🏠 Imóveis</a></li>
        <li><a href="#" onclick="showSection('usuarios')">👥 Usuários</a></li>
        <li><a href="#" onclick="showSection('configuracoes')">⚙️ Configurações</a></li>
        <li><a href="/Pagina_inicial">← Voltar ao Site</a></li>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-left">
          <h1 id="pageTitle">Gerenciar Imóveis</h1>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" id="themeToggle" title="Alternar modo claro/escuro"></button>
          <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <!-- IMOVEIS SECTION -->
        <div id="imoveis-section" class="section">
          <div class="section-header">
            <h2>Gerenciar Imóveis</h2>
            <div class="section-actions">
              <button class="btn-primary" onclick="openAddModal()">+ Adicionar Imóvel</button>
            </div>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Título</th>
                  <th>Tipo</th>
                  <th>Localização</th>
                  <th>Preço</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="imoveisTable">

              </tbody>
            </table>
          </div>
        </div>

        <!-- USUARIOS SECTION -->
        <div id="usuarios-section" class="section" style="display: none;">
          <div class="section-header">
            <h2>Gerenciar Usuários</h2>
          </div>


          <tbody>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Tipo</th>
                    <th>Data de Cadastro</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <!-- ADICIONADO O ID AQUI E LIMPADAS AS LINHAS FIXAS -->
                <tbody id="usuariosTable">
                  <!-- O JavaScript vai preencher este espaço automaticamente -->
                </tbody>
              </table>
            </div>
          </tbody>

        </div>
      </div>

      <!-- CONFIGURACOES SECTION -->
      <div id="configuracoes-section" class="section" style="display: none;">
        <div class="section-header">
          <h2>Configurações</h2>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem;">
          <div class="form-group">
            <label>Nome da Empresa</label>
            <input type="text" value="Bela Vista Imobiliária" placeholder="Nome da empresa">
          </div>
          <div class="form-group">
            <label>Email de Contato</label>
            <input type="email" value="contato@belavista.com.br" placeholder="Email">
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" value="(17) 9 9999-9999" placeholder="Telefone">
          </div>
          <div class="form-group">
            <label>Endereço</label>
            <input type="text" value="Centro, Itajobi - SP" placeholder="Endereço">
          </div>
          <button class="btn-primary" onclick="saveSettings()">Salvar Configurações</button>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- MODAL PARA ADICIONAR/EDITAR IMÓVEL -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Adicionar Novo Imóvel</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <form id="imovelForm" onsubmit="handleSubmitImovel(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Título *</label>
            <input type="text" name="titulo" placeholder="Ex: Casa com Edícula no Centro" required>
          </div>
          <div class="form-group">
            <label>Tipo *</label>
            <select name="tipo" required>
              <option value="">Selecione</option>
              <option value="casa">Casa</option>
              <option value="apartamento">Apartamento</option>
              <option value="terreno">Terreno</option>
              <option value="comercio">Comércio</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Status *</label>
            <select name="status" required>
              <option value="">Selecione</option>
              <option value="venda">À Venda</option>
              <option value="aluguel">Para Alugar</option>
            </select>
          </div>
          <div class="form-group">
            <label>Preço *</label>
            <input type="text" name="preco" placeholder="R$ 0,00" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Quartos</label>
            <input type="number" name="quartos" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>Banheiros</label>
            <input type="number" name="banheiros" placeholder="0" min="0">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Vagas</label>
            <input type="number" name="vagas" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>Área (m²)</label>
            <input type="number" name="area" placeholder="0" min="0">
          </div>
        </div>

        <div class="form-group">
          <label>Localização *</label>
          <input type="text" name="localizacao" placeholder="Ex: Centro, Itajobi - SP" required>
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <textarea name="descricao" placeholder="Descreva o imóvel..." rows="4"></textarea>
        </div>

        <div class="form-group">
          <label>Imagem</label>
          <input type="file" name="imagem" accept="image/*">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-save">Salvar Imóvel</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    // ==========================================
    // PASSO 1: CONFIGURAÇÃO GLOBAL DA API (NO TOPO)
    // ==========================================
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3200/api'
      : 'https://projeto-integrador-1-h022.onrender.com/api';
    
    
    // ==========================================
    // PASSO 2: CONTROLE DE ACESSO (O SCRIPT DE PROTEÇÃO)
    // ==========================================
    (async function protegerPagina() {
        document.documentElement.style.display = 'none';
        const token = localStorage.getItem('token');
    
        if (!token) {
            alert('Acesso negado. Faça login para acessar esta página.');
            window.location.href = '/login';
            return;
        }
    
        try {
            const resposta = await fetch(`${API_URL}/auth/verificar-admin`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });
    
            const dados = await resposta.json();
    
            if (resposta.ok && dados.valido === true) {
                document.documentElement.style.display = '';
                
                // Só carrega os dados do banco após garantir que o usuário é admin
                carregarImoveis();
                carregarUsuarios();
            } else {
                alert(dados.erro || 'Acesso negado. Você não tem permissão de administrador.');
                window.location.href = '/login';
            }
        } catch (erro) {
            console.error("Erro na validação do token:", erro);
            alert('Sessão inválida ou erro de conexão.');
            window.location.href = '/login';
        }
    })();
    
    
    // ==========================================
    // PASSO 3: FUNÇÕES DE CONTROLE DOS MODAIS
    // ==========================================
    function openAddModal() {
        document.getElementById('addModal').classList.add('open');
        document.getElementById('modalTitle').textContent = 'Adicionar Novo Imóvel';
        document.getElementById('imovelForm').reset();
    }
    
    function closeModal() {
        document.getElementById('addModal').classList.remove('open');
    }
    
    function editImovel(id) {
        document.getElementById('addModal').classList.add('open');
        document.getElementById('modalTitle').textContent = 'Editar Imóvel';
    }
    
    
    // ==========================================
    // PASSO 4: SISTEMA DE IMÓVEIS (GERENCIAMENTO)
    // ==========================================
    async function carregarImoveis() {
      try {
        const resposta = await fetch(`${API_URL}/imoveis`);
        const imoveis = await resposta.json();
    
        console.log("IMÓVEIS:", imoveis);
    
        const tbody = document.getElementById("imoveisTable");
        if (!tbody) {
          console.error("tbody imoveisTable não encontrado");
          return;
        }
    
        tbody.innerHTML = "";
    
        imoveis.forEach(imovel => {
          const tr = document.createElement("tr");
          const precoFormatado = imovel.preco 
            ? parseFloat(imovel.preco).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
            : "R$ 0,00";
    
          tr.innerHTML = `
            <td>${imovel.titulo || "-"}</td>
            <td>${imovel.tipo_imovel || "-"}</td>
            <td>${imovel.endereco || "-"}</td>
            <td>${precoFormatado}</td>
            <td>${imovel.tipo_negocio || "-"}</td>
            <td>
              <button class="btn-delete" onclick="deleteImovel(${imovel.id})">Excluir</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (erro) {
        console.error("Erro ao carregar imóveis:", erro);
      }
    }
    
    function deleteImovel(id) {
        if (confirm('Tem certeza que deseja deletar este imóvel?')) {
            fetch(`${API_URL}/imoveis/${id}`, { method: 'DELETE' })
            .then(response => {
                if (response.ok) {
                    alert('Imóvel deletado com sucesso!');
                    carregarImoveis();
                } else {
                    alert('Erro ao deletar: O servidor rejeitou o pedido.');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                alert('Erro de conexão com o servidor.');
            });
        }
    }
    
    async function handleSubmitImovel(event) {
      event.preventDefault();
    
      const form = document.getElementById('imovelForm');
      const data = new FormData(form);
    
      const imovel = {
        usuario_id: 9, // ID fixado do Administrador Diogo
        referencia: "REF-" + Date.now(),
        tipo_negocio: data.get('status'),
        tipo_imovel: data.get('tipo'),
        titulo: data.get('titulo'),
        descricao: data.get('descricao'),
        preco: parseFloat(data.get('preco').replace(/[^\d,]/g, '').replace(',', '.')),
        endereco: data.get('localizacao'),
        quartos: parseInt(data.get('quartos') || 0),
        banheiros: parseInt(data.get('banheiros') || 0),
        vagas: parseInt(data.get('vagas') || 0),
        area_m2: parseFloat(data.get('area') || 0),
        ativo: true
      };
    
      try {
        const resposta = await fetch(`${API_URL}/imoveis`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(imovel)
        });
    
        if (resposta.ok) {
            alert("Imóvel salvo com sucesso!");
            closeModal();
            carregarImoveis();
        } else {
            alert("O servidor recusou salvar o imóvel.");
        }
      } catch (erro) {
        console.error("Erro ao salvar imóvel:", erro);
        alert("Erro ao salvar imóvel");
      }
    }
    
    
    // ==========================================
    // PASSO 5: SISTEMA DE USUÁRIOS (GERENCIAMENTO)
    // ==========================================
    async function carregarUsuarios() {
      try {
        const resposta = await fetch(`${API_URL}/usuarios`);
        const usuarios = await resposta.json();
    
        console.log("USUÁRIOS:", usuarios);
    
        const tbody = document.getElementById("usuariosTable");
        if (!tbody) return;
    
        tbody.innerHTML = ""; 
    
        usuarios.forEach(usuario => {
          const tr = document.createElement("tr");
          const dataFormatada = usuario.criado_em 
            ? new Date(usuario.criado_em).toLocaleDateString('pt-BR') 
            : "-";
    
          const perfilUsuario = usuario.adm === true || usuario.adm === 1 
            ? "Administrador" 
            : (usuario.tipo_interesse || "Cliente");
    
          tr.innerHTML = `
            <td>${usuario.nome || "-"}</td>
            <td>${usuario.email || "-"}</td>
            <td>${perfilUsuario}</td>
            <td>${dataFormatada}</td>
            <td>
              <div class="action-buttons">
                <button class="btn-delete" onclick="deleteUser(${usuario.id})">Deletar</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (erro) {
        console.error("Erro ao carregar usuários:", erro);
      }
    }
    
    function deleteUser(id) {
      if (confirm('Tem certeza que deseja deletar este usuário?')) {
        fetch(`${API_URL}/usuarios/${id}`, { method: 'DELETE' })
        .then(response => {
          if (response.ok) {
            alert('Usuário deletado com sucesso!');
            carregarUsuarios();
          } else {
            alert('Erro ao deletar: O servidor rejeitou a exclusão.');
          }
        })
        .catch(error => {
          console.error('Erro na requisição de exclusão:', error);
          alert('Erro de conexão com o servidor.');
        });
      }
    }
    
    
    // ==========================================
    // PASSO 6: UTILITÁRIOS ADICIONAIS E EVENTOS
    // ==========================================
    function mapTipoImovel(tipo) {
      const map = { casa: "Casa", apartamento: "Apartamento", terreno: "Terreno", comercio: "Comercial" };
      return map[tipo] || tipo;
    } 
    
    function mapTipoNegocio(status) {
      const map = { venda: "Venda", aluguel: "Aluguel" };
      return map[status] || status;
    }
    
    function logout() {
        if (confirm('Tem certeza que deseja sair?')) {
          localStorage.removeItem('token'); // Limpa a sessão
          window.location.href = '/login';
        }
    }
    
    // Fecha modal clicando fora dele
    document.getElementById('addModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    </script>
</body>

</html>
